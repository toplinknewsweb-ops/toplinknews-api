services:
  - type: web
    name: toplinknews-api
    runtime: node
    plan: free          # upgrade to 'starter' ($7/mo) to eliminate cold starts
    region: oregon
    branch: main

    buildCommand: npm install --omit=dev
    startCommand: node server.js

    healthCheckPath: /health

    # Render auto-deploys when you push to GitHub
    autoDeploy: true

    envVars:
      # Node runtime
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0

      # Cache TTL in milliseconds (default 10 min = 600000)
      # Lower this if you want more frequent news refreshes.
      # Note: Google News RSS may rate-limit very aggressive polling.
      - key: CACHE_TTL_MS
        value: 600000

      # Per-feed HTTP timeout in milliseconds
      - key: FETCH_TIMEOUT
        value: 9000

    # Render Free tier suspends after 15 min of inactivity.
    # Upgrading to Starter keeps the service always-on.
    # Alternatively, use an external cron pinger (e.g. cron-job.org)
    # to GET https://toplinknews-api.onrender.com/health every 10 minutes.
